<!DOCTYPE html>
<html lang='en'>

<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Battle Royale Task Scheduler</title>

  <!-- Load our CSS stylesheet -->
  <link rel='stylesheet' href='style.css'>
</head>

<body>

  <!-- MAIN WRAPPER: centers everything and limits max width -->
  <div class='container'>

    <!-- ========== PAGE HEADER ========== -->
    <div class='header'>
      <h1>&#9876; BATTLE ROYALE SCHEDULER</h1>
      <p>Deploy your troops strategically. Powered by Greedy Algorithm + Priority Queue.</p>
    </div>


    <!-- ========== CARD 1: ADD TASKS ========== -->
    <div class='card'>
      <h2>&#9993; Add Your Troops (Tasks)</h2>

      <!--
        INPUT GRID: 5 columns
        [Task Name] [Deadline] [Duration] [Difficulty dropdown] [+ADD button]
      -->
      <div class='input-grid'>

        <!-- Column 1: Task Name -->
        <div class='form-group'>
          <label>TROOP NAME (Task)</label>
          <input type='text' id='taskName' placeholder='e.g. Math Assignment'>
        </div>

        <!-- Column 2: Deadline in hours -->
        <div class='form-group'>
          <label>DEADLINE (hours from now)</label>
          <input type='number' id='deadline' placeholder='6' min='0.5' step='0.5'>
        </div>

        <!-- Column 3: How long this task takes -->
        <div class='form-group'>
          <label>DURATION (hours needed)</label>
          <input type='number' id='duration' placeholder='2' min='0.5' step='0.5'>
        </div>

        <!-- Column 4: How hard is this task? -->
        <div class='form-group'>
          <label>DIFFICULTY</label>
          <select id='difficulty'>
            <option value='1'>1 - Easy</option>
            <option value='2'>2 - Simple</option>
            <option value='3' selected>3 - Medium</option>
            <option value='4'>4 - Hard</option>
            <option value='5'>5 - Beast</option>
          </select>
        </div>

        <!-- Column 5: Submit button -->
        <!-- onclick calls addTask() which is defined in ui.js -->
        <button class='btn btn-add' onclick='addTask()'>+ ADD</button>

      </div><!-- end .input-grid -->

      <!--
        TASK LIST: Shows all added tasks as "chips"
        Starts with placeholder text.
        renderTaskList() in ui.js fills this with real tasks.
      -->
      <div id='taskList' class='task-list'>
        <div class='empty-state'>No troops added yet. Add tasks above!</div>
      </div>

    </div><!-- end card 1 -->


    <!-- ========== GENERATE BUTTON ========== -->
    <!-- onclick calls generateSchedule() which is defined in ui.js -->
    <button class='btn btn-generate' onclick='generateSchedule()'>
      &#9876; GENERATE BATTLE STRATEGY (Schedule Tasks)
    </button>


    <!-- ========== CARD 2: OUTPUT (hidden until schedule is generated) ========== -->
    <!--
      Note: class='card hidden' — the 'hidden' class applies display:none
      When user clicks Generate, ui.js removes 'hidden' to show this card
    -->
    <div id='outputCard' class='card hidden'>

      <h2>&#9878; Battle Deployment Order</h2>

      <!-- STATS: 4 boxes showing summary numbers -->
      <div class='stats-grid'>

        <div class='stat-card'>
          <div class='stat-number' id='stat-scheduled'>0</div>
          <div class='stat-label'>Troops Deployed</div>
        </div>

        <div class='stat-card'>
          <div class='stat-number' id='stat-skipped'>0</div>
          <div class='stat-label'>Skipped (Infeasible)</div>
        </div>

        <div class='stat-card'>
          <div class='stat-number' id='stat-time'>0h</div>
          <div class='stat-label'>Total Battle Time</div>
        </div>

        <div class='stat-card'>
          <div class='stat-number' id='stat-score'>0</div>
          <div class='stat-label'>Efficiency Score</div>
        </div>

      </div><!-- end .stats-grid -->

      <!-- TIMELINE BAR: Colorful bar showing task proportions -->
      <!-- ui.js fills this with colored blocks after scheduling -->
      <div id='timeline' class='timeline'></div>

      <!-- SCHEDULE LIST: Each task slot (or skipped slot) -->
      <!-- ui.js fills this with schedule slot HTML -->
      <div id='scheduleList'></div>

      <!-- ALGORITHM EXPLANATION: Shows which algorithms were used -->
      <!-- ui.js fills this with the explanation text -->
      <div id='algoExplanation' class='algo-explanation'></div>

    </div><!-- end card 2 (outputCard) -->

  </div>
  <script src='scheduler.js'></script>
  <script src='ui.js'></script>

</body>
</html>
